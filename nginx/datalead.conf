server {
    listen 80;
    server_name shanmanoid.xyz www.shanmanoid.xyz;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Vite hashed assets — cache forever
    location /datalead/assets/ {
        alias /var/www/datalead-website/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # i18next locale files — short cache
    location /datalead/locales/ {
        alias /var/www/datalead-website/locales/;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Images
    location ~* ^/datalead/.*\.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        root /var/www/datalead-website;
        rewrite ^/datalead/(.*)$ /$1 break;
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location /datalead/ {
        alias /var/www/datalead-website/;
        try_files $uri $uri/ /datalead/index.html;
    }

    # Redirect /datalead to /datalead/
    location = /datalead {
        return 301 /datalead/;
    }
}
