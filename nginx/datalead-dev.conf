server {
    listen 80;
    server_name dev.datalead.az;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Vite hashed assets
    location /datalead/assets/ {
        alias /var/www/dev.datalead-website/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # i18next locale files
    location /datalead/locales/ {
        alias /var/www/dev.datalead-website/locales/;
        expires 5m;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location /datalead/ {
        alias /var/www/dev.datalead-website/;
        try_files $uri $uri/ /datalead/index.html;
    }

    # Redirect /datalead to /datalead/
    location = /datalead {
        return 301 /datalead/;
    }
}
